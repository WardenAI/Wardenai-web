<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <rect width="600" height="300" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">AI API Spend vs Cloud Spend Growth</text>

  <!-- Y axis -->
  <line x1="70" y1="50" x2="70" y2="250" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="250" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">$0</text>
  <text x="60" y="150" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">$250K</text>
  <text x="60" y="70" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">$500K</text>

  <!-- X axis -->
  <line x1="70" y1="250" x2="560" y2="250" stroke="#e2e8f0" stroke-width="1"/>
  <text x="120" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Q1</text>
  <text x="220" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Q2</text>
  <text x="320" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Q3</text>
  <text x="420" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Q4</text>
  <text x="520" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Q5</text>

  <!-- Cloud spend line (gradual) -->
  <polyline points="120,230 220,215 320,200 420,185 520,170" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI spend line (exponential) -->
  <polyline points="120,235 220,210 320,170 420,110 520,60" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Legend -->
  <line x1="350" y1="288" x2="370" y2="288" stroke="#059669" stroke-width="2.5"/>
  <text x="375" y="292" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">AI API spend</text>
  <line x1="460" y1="288" x2="480" y2="288" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="485" y="292" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Cloud spend</text>
</svg>
