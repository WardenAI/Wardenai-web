<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <rect width="600" height="280" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Where Is Your AI Spend Going?</text>

  <!-- Left: What you see -->
  <rect x="40" y="55" width="240" height="190" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="160" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f172a">What your provider shows</text>

  <rect x="65" y="100" width="190" height="40" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="160" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#dc2626">$47,832.00</text>

  <text x="160" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">March 2026</text>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">That's it. One number.</text>
  <text x="160" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">No breakdown. No attribution.</text>

  <!-- Arrow -->
  <text x="300" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#059669">→</text>

  <!-- Right: What you need -->
  <rect x="320" y="55" width="240" height="190" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="440" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f172a">What you actually need</text>

  <!-- Breakdown bars -->
  <text x="340" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Chat support</text>
  <rect x="420" y="96" width="120" height="16" rx="3" fill="#059669" opacity="0.8"/>
  <text x="535" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#0f172a">$18.2K</text>

  <text x="340" y="133" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Doc summarizer</text>
  <rect x="420" y="121" width="85" height="16" rx="3" fill="#059669" opacity="0.6"/>
  <text x="535" y="133" font-family="system-ui, sans-serif" font-size="10" fill="#0f172a">$12.9K</text>

  <text x="340" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Code review</text>
  <rect x="420" y="146" width="60" height="16" rx="3" fill="#059669" opacity="0.4"/>
  <text x="535" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#0f172a">$9.1K</text>

  <text x="340" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Search</text>
  <rect x="420" y="171" width="35" height="16" rx="3" fill="#059669" opacity="0.3"/>
  <text x="535" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#0f172a">$4.8K</text>

  <text x="340" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Staging/dev</text>
  <rect x="420" y="196" width="20" height="16" rx="3" fill="#f59e0b" opacity="0.5"/>
  <text x="535" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#0f172a">$2.8K</text>

  <text x="340" y="233" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">By feature, team, customer, env</text>
</svg>
